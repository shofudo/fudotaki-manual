<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>きぬ川不動瀧 スタッフマニュアル</title>
  
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="preload" as="image" href="assets/img/top/top2.jpg">

<style>
  :root {
    --bg: #f3efe7;
    --bg-soft: rgba(255, 252, 247, 0.88);
    --card: rgba(255, 251, 245, 0.9);
    --ink: #201a17;
    --muted: #6f655d;
    --acc: #6f5a47;
    --acc-morning: #9b6b35;
    --acc-dinner: #45556f;
    --acc-work: #56615f;
    --bd: rgba(111, 90, 71, 0.16);
    --radius: 24px;
    --maxw: 720px;
    --shadow: 0 24px 60px rgba(38, 28, 21, 0.12);
  }

  html, body {
    margin: 0;
    padding: 0;
    background:
      linear-gradient(180deg, rgba(24, 20, 18, 0.28), rgba(24, 20, 18, 0.08)),
      radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 48%),
      var(--bg) url("assets/img/top/washi-bg.jpg");
    background-size: auto, auto, cover;
    background-attachment: fixed;
    font-family: "Hiragino Sans", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    line-height: 1.7;
  }

  header {
    position: relative;
    background:
      linear-gradient(135deg, rgba(29, 24, 21, 0.9), rgba(74, 57, 46, 0.78)),
      url("assets/img/top/top2.jpg") center/cover;
    color: #fff;
    padding: 3rem 1rem 5.5rem;
    text-align: center;
    border-bottom-left-radius: 40px;
    border-bottom-right-radius: 40px;
    box-shadow: 0 22px 50px rgba(24, 19, 17, 0.2);
  }

  .app-title {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    margin: 0;
    text-transform: uppercase;
  }

  .greeting {
    font-size: 0.92rem;
    opacity: 0.84;
    margin-top: 12px;
    font-weight: 500;
  }

  main {
    max-width: var(--maxw);
    margin: -4rem auto 3.5rem;
    padding: 0 18px;
    position: relative;
    z-index: 10;
  }

  .hero-icon {
    width: 116px;
    height: 116px;
    border-radius: 50%;
    border: 5px solid rgba(255, 250, 243, 0.95);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin: 0 auto 24px;
    background: #fff;
  }

  .hero-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .notice-badge {
    background: var(--bg-soft);
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.92rem;
    color: var(--acc);
    border: 1px solid var(--bd);
    backdrop-filter: blur(14px);
  }

  .notice-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 28px;
    border-radius: 999px;
    background: rgba(69, 85, 111, 0.12);
    color: var(--acc-dinner);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .notice-icon svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    padding: 18px 18px 18px 22px;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    border: 1px solid var(--bd);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(18px);
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 30px 60px rgba(38, 28, 21, 0.14);
    border-color: rgba(111, 90, 71, 0.28);
  }

  .card:active {
    transform: scale(0.99);
  }

  .card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    background: var(--bd);
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.32), transparent 50%);
    pointer-events: none;
  }

  .type-dinner::before { background: var(--acc-dinner); }
  .type-morning::before { background: var(--acc-morning); }
  .type-work::before { background: var(--acc-work); }

  .icon-box {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 48px;
    height: 44px;
    padding: 0;
    border-radius: 14px;
    background: rgba(69, 85, 111, 0.1);
    color: var(--acc-dinner);
    margin-right: 16px;
    opacity: 0.88;
  }
  .icon-box svg {
    width: 22px;
    height: 22px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .type-morning .icon-box {
    background: rgba(155, 107, 53, 0.12);
    color: var(--acc-morning);
  }
  .type-work .icon-box {
    background: rgba(86, 97, 95, 0.12);
    color: var(--acc-work);
  }

  .text-box {
    flex: 1;
  }

  .card-title {
    display: block;
    font-weight: 700;
    font-size: 1.02rem;
    margin-bottom: 4px;
    color: var(--ink);
  }

  .card-desc {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .arrow {
    color: rgba(111, 90, 71, 0.45);
    font-weight: bold;
    font-size: 1.1rem;
  }

  footer {
    text-align: center;
    font-size: 0.75rem;
    color: rgba(255, 250, 243, 0.72);
    padding: 1.4rem 0 2rem;
  }

  @media (min-width: 480px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .card:first-child {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, rgba(255, 252, 247, 0.98), rgba(241, 235, 226, 0.92));
    }
  }
</style>
</head>
<body>

<header>

  <div class="greeting" id="greeting">おつかれさまです</div>
</header>

        </svg>
      </div>
      <div class="text-box">
        <span class="card-title">キセツのこんだて</span>
        <span class="card-desc">Dish Descriptions & Serving Procedures</span>
      </div>
      <span class="arrow">›</span>

    <!-- <a href="pages/newyear-dinner.html" class="card type-dinner">
      <div class="icon-box">🎍</div>
      <div class="text-box">
        <span class="card-title">ネンマツネンシ　こんだて</span>
        <span class="card-desc">Dish Descriptions & Serving Procedures</span>
      </div>
      <span class="arrow">›</span>
    </a> -->

    <a href="pages/wagyu-steak.html" class="card type-dinner">
      <div class="icon-box" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M7 7c2-2 5-3 8-2 2 .6 3 2.2 3 4.2 0 4-3.2 7.8-8.2 9.6-1.6.6-3.4-.1-4.1-1.7C4.5 14.3 5.1 10.2 7 7z"/>
          <path d="M10 9c1.4-.6 3-.4 4.2.5"/>
          <path d="M9.5 12.5c1.2-.5 2.5-.4 3.5.3"/>
        </svg>
      </div>
      <div class="text-box">
        <span class="card-title">わぎゅうかいせき・ステーキ</span>

      <span class="arrow">›</span>

    <a href="pages/dinner-guide.html" class="card type-dinner">
      <div class="icon-box" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M6 5.5A2.5 2.5 0 0 1 8.5 3H19v15H8.5A2.5 2.5 0 0 0 6 20.5z"/>
          <path d="M6 5.5v15"/>
          <path d="M10 7h5"/>

        </svg>

    <a href="pages/breakfast-guide.html" class="card type-morning">
      <div class="icon-box" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M6 15a6 6 0 0 1 12 0"/>

          <path d="M12 3v3"/>

        </svg>
      </div>
      <div class="text-box">
        <span class="card-title">チョウショクあんない</span>

    <a href="pages/checkin-out.html" class="card type-work">

      <div class="text-box">
        <span class="card-title">チェックイン・アウト</span>

  </div>
</main>

<footer>
  &copy; Kinugawa Fudotaki Staff Manual
</footer>

<script>
  // Service Worker 登録
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js');
  }

  // 時間帯に合わせて挨拶を変えるスクリプト
  const h = new Date().getHours();
  const el = document.getElementById('greeting');
  if (h >= 4 && h < 11) {
    el.textContent = "おはようございます。";
  } else if (h >= 11 && h < 17) {

    el.textContent = "こんにちは。ガンバリましょう。";

  } else {
    el.textContent = "おつかれさまです。タイチョウにきをつけて。";
  }
</script>

</body>
</html>
